{% extends 'base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-check-circle me-2"></i>Password Reset Complete</h4>
                </div>
                <div class="card-body text-center">
                    <div class="mb-4">
                        <i class="fas fa-key fa-4x text-success"></i>
                    </div>
                    <h5>Your password has been set!</h5>
                    <p class="text-muted">
                        You may now log in with your new password.
                    </p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Log In Now
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
