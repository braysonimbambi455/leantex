<td>
    <div class="btn-group">
        {% if booking.status == 'confirmed' and not booking.technician %}
            <a href="{% url 'dashboard:admin_assign_technician' booking.id %}" class="btn btn-sm btn-success" title="Assign Technician">
                <i class="fas fa-user-plus"></i>
            </a>
        {% endif %}
        <a href="{% url 'admin:bookings_booking_change' booking.id %}" class="btn btn-sm btn-outline-primary" title="Edit">
            <i class="fas fa-edit"></i>
        </a>
        <a href="{% url 'bookings:detail' booking.id %}" class="btn btn-sm btn-outline-info" title="View">
            <i class="fas fa-eye"></i>
        </a>
    </div>
</td>
